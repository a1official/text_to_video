name: Build Runpod Serverless LTX Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: false
        default: latest
  push:
    branches:
      - codex/ltx-commercial-pipeline
    paths:
      - '.github/workflows/build-runpod-serverless-ltx.yml'
      - 'infra/runpod-serverless/ltx/**'
      - 'apps/runpod_ltx_service/**'
      - 'packages/python/text2video/**'
      - 'scripts/runpod/**'
      - 'pyproject.toml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/text2video-ltx-serverless
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/runpod-serverless/ltx/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

